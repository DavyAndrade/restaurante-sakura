name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Tkinter)
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run model tests
        run: python -m unittest tests.test_models -v

      - name: Run controller tests
        run: python -m unittest tests.test_controllers -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install system dependencies (Tkinter)
        run: sudo apt-get update && sudo apt-get install -y python3-tk
      - name: Check syntax
        run: |
          python -m py_compile main.py
          python -m py_compile database/db_manager.py
          for f in models/*.py; do python -m py_compile "$f"; done
          for f in controllers/*.py; do python -m py_compile "$f"; done
          for f in views/*.py; do python -m py_compile "$f"; done
